name: Train Koopman-Spectral and Generate Signals

on:
  schedule:
    - cron: '0 2 * * 1-5'  # 2 AM UTC, Mon-Fri
  workflow_dispatch:  # Manual trigger

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 hour safety margin
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create data directory
      run: mkdir -p /mnt/data/p2-etf-deepm-data/data
    
    - name: Download master.parquet from HF Hub
      run: |
        echo "Downloading master.parquet from HuggingFace..."
        python -c "
        import requests
        url = 'https://huggingface.co/datasets/P2SAMAPA/p2-etf-deepm-data/resolve/main/data/master.parquet'
        r = requests.get(url, timeout=120)
        r.raise_for_status()
        with open('/mnt/data/p2-etf-deepm-data/data/master.parquet', 'wb') as f:
            f.write(r.content)
        print(f'Downloaded: {len(r.content)} bytes')
        "
    
    - name: Verify data
      run: |
        ls -lh /mnt/data/p2-etf-deepm-data/data/
        python -c "
        import pandas as pd
        df = pd.read_parquet('/mnt/data/p2-etf-deepm-data/data/master.parquet')
        print(f'Rows: {len(df)}')
        print(f'Columns: {list(df.columns)[:10]}...')
        print(f'ETFs: {df.get(\\\"symbol\\\", df.get(\\\"etf\\\", df.iloc[:,0])).nunique()}')
        "
    
    - name: Train model
      run: |
        echo "Starting training at $(date)"
        python train.py
        echo "Training complete at $(date)"
    
    - name: Generate signals
      run: |
        echo "Generating signals at $(date)"
        python generate_signals.py
    
    - name: Upload model artifact
      uses: actions/upload-artifact@v4
      with:
        name: koopman-model-${{ github.run_id }}
        path: |
          koopman_spectral_*.pt
          training_history.json
    
    - name: Upload signals
      uses: actions/upload-artifact@v4
      with:
        name: koopman-signals-${{ github.run_id }}
        path: signals/
    
    - name: Commit signals to repo (optional)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add signals/
        git commit -m "Update Koopman signals $(date +%Y-%m-%d)" || echo "No changes"
        git push || echo "Push failed"
