name: Train Koopman-Spectral and Upload to HF

on:
  schedule:
    - cron: '0 2 * * 1-5'  # 2 AM UTC, Mon-Fri
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download training data from HF
      run: |
        mkdir -p data/p2-etf-deepm-data
        python << 'EOF'
        import requests
        url = 'https://huggingface.co/datasets/P2SAMAPA/p2-etf-deepm-data/resolve/main/data/master.parquet'
        r = requests.get(url, timeout=120)
        r.raise_for_status()
        with open('data/p2-etf-deepm-data/master.parquet', 'wb') as f:
            f.write(r.content)
        print(f'Downloaded: {len(r.content)} bytes')
        EOF
    
    - name: Train model
      run: |
        echo "Starting training at $(date)"
        python train.py
        echo "Training complete at $(date)"
    
    - name: Generate signals
      run: |
        echo "Generating signals at $(date)"
        python generate_signals.py
    
    - name: Upload results to HF Hub
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        if [ -z "$HF_TOKEN" ]; then
          echo "❌ HF_TOKEN not set. Skipping upload."
          echo "Please add HF_TOKEN at: https://github.com/${{ github.repository }}/settings/secrets/actions"
          exit 0
        fi
        echo "✓ HF_TOKEN is set, uploading..."
        python hf_results_uploader.py
    
    - name: Summary
      run: |
        echo "=== Run Complete ==="
        ls -la signals/ 2>/dev/null || echo "No signals"
        if [ -f hf_upload_manifest.json ]; then
          cat hf_upload_manifest.json
        fi
