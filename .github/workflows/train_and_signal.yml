name: Train Koopman-Spectral and Upload to HF

on:
  schedule:
    - cron: '0 2 * * 1-5'  # 2 AM UTC, Mon-Fri
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download training data from HF
      run: |
        mkdir -p data/p2-etf-deepm-data
        python -c "
        import requests
        url = 'https://huggingface.co/datasets/P2SAMAPA/p2-etf-deepm-data/resolve/main/data/master.parquet'
        r = requests.get(url, timeout=120)
        r.raise_for_status()
        with open('data/p2-etf-deepm-data/master.parquet', 'wb') as f:
            f.write(r.content)
        print(f'Downloaded: {len(r.content)} bytes to data/p2-etf-deepm-data/master.parquet')
        "
    
    - name: Verify data
      run: |
        ls -lh data/p2-etf-deepm-data/
        python -c "
        import pandas as pd
        df = pd.read_parquet('data/p2-etf-deepm-data/master.parquet')
        print(f'Rows: {len(df)}')
        print(f'Columns: {list(df.columns)[:10]}...')
        print(f'ETFs: {df[\\\"symbol\\\"].nunique() if \\\"symbol\\\" in df.columns else \\\"check columns\\\"}')
        "
    
    - name: Update config for local data path
      run: |
        python -c "
        import yaml
        with open('config.yaml', 'r') as f:
            config = yaml.safe_load(f)
        config['data']['local_path'] = 'data/p2-etf-deepm-data'
        with open('config.yaml', 'w') as f:
            yaml.dump(config, f)
        print('Updated config.local_path to data/p2-etf-deepm-data')
        "
    
    - name: Train model
      run: |
        echo "Starting training at $(date)"
        python train.py
        echo "Training complete at $(date)"
    
    - name: Generate signals
      run: |
        echo "Generating signals at $(date)"
        python generate_signals.py
    
    - name: Upload all results to HF Hub
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        echo "Uploading results to HF: P2SAMAPA/p2-etf-koopman-spectral-results"
        python hf_results_uploader.py
    
    - name: Summary
      run: |
        echo "=== Run Complete ==="
        echo "Results uploaded to: https://huggingface.co/datasets/P2SAMAPA/p2-etf-koopman-spectral-results"
        if [ -f hf_upload_manifest.json ]; then
          cat hf_upload_manifest.json
        fi
