# P2 ETF Koopman-Spectral Engine Configuration
# Research only · Not financial advice

data:
  hf_dataset: "P2SAMAPA/p2-etf-deepm-data"
  hf_file: "data/master.parquet"
  local_path: "data/p2-etf-deepm-data"
  etf_universe: ["SPY", "QQQ", "XLK", "XLF", "XLE", "XLV", "XLI", "XLY", "XLRE", "XLB", 
                 "XLP", "XLU", "GDX", "XME", "IWM", "TLT", "LQD", "HYG", 
                 "VNQ", "GLD", "SLV", "VCIT"]
  macro_features: ["VIX", "T10Y2Y", "DXY", "HY", "IG", "WTI", "DTB3", "T10Y", "spread"]
  train_start: "2008-01-01"
  train_end: "2025-12-31"
  val_days: 252
  lookback_window: 63
  target_horizon: 5

model:
  input_dim: 2
  observable_dim: 64
  encoder_hidden: [128, 128]
  encoder_activation: "relu"
  dropout: 0.1
  linearity_weight: 1.0
  prediction_weight: 1.0
  spectral_weight: 0.1

training:
  epochs: 500
  batch_size: 32
  learning_rate: 0.001
  patience: 20
  dmd_init: false          # Set to true only after fixing DMD in koopman_model.py

signals:
  output_dir: "signals"
  predictability_threshold: 0.6
  modes_to_track: 5

github_actions:
  max_runtime_minutes: 300
  cache_data: true
