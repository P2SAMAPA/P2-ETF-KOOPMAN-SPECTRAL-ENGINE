# P2 ETF Koopman-Spectral Engine Configuration
# Research only · Not financial advice

data:
  hf_dataset: "P2SAMAPA/p2-etf-deepm-data"
  hf_file: "data/master.parquet"
  local_path: "data/p2-etf-deepm-data"
  etf_universe: ["SPY", "QQQ", "XLK", "XLF", "XLE", "XLV", "XLI", "XLY", "XLRE", "XLB", 
                 "XLP", "XLU", "GDX", "XME", "IWM", "TLT", "LQD", "HYG", 
                 "VNQ", "GLD", "SLV", "VCIT"]
  # All available macro features from the dataset
  macro_features: [
    "HY_IG_ratio_zscore",
    "credit_stress",
    "USD_zscore",
    "USD_chg",
    "OIL_zscore",
    "OIL_chg",
    "OIL_log",
    "TBILL_daily",
    "VIX",
    "T10Y2Y",
    "DGS10",
    "DTB3",
    "HY_SPREAD"
  ]
  train_start: "2008-01-01"
  train_end: "2025-12-31"
  val_days: 252
  lookback_window: 63
  target_horizon: 5

model:
  # input_dim will be set automatically = 2 (returns + vol) + len(macro_features)
  observable_dim: 128
  encoder_hidden: [256, 256, 128]
  encoder_activation: "relu"
  dropout: 0.05
  linearity_weight: 0.1
  prediction_weight: 1.0
  spectral_weight: 0.01

training:
  epochs: 1000
  batch_size: 64
  learning_rate: 0.001
  patience: 100
  dmd_init: false

signals:
  output_dir: "signals"
  predictability_threshold: 0.6
  modes_to_track: 5

github_actions:
  max_runtime_minutes: 300
  cache_data: true
