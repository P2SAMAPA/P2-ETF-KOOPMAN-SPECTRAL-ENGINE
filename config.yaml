# P2 ETF Koopman-Spectral Engine Configuration
# Research only · Not financial advice

data:
  # HuggingFace dataset configuration
  hf_dataset: "P2SAMAPA/p2-etf-deepm-data"
  hf_file: "data/master.parquet"  # Path within repo
  
  # Local fallback path (GitHub Actions / local dev)
  local_path: "/mnt/data/p2-etf-deepm-data"
  
  # ETF universe (must match symbols in master.parquet)
  etf_universe: ["SPY", "QQQ", "XLK", "XLF", "XLE", "XLV", "XLI", "XLY", "XLRE", "XLB", 
                 "XLP", "XLU", "GDX", "XME", "IWM", "TLT", "LQD", "HYG", 
                 "VNQ", "GLD", "SLV", "VCIT"]
  
  # Macro features to extract from master.parquet (flexible matching)
  macro_features: ["VIX", "T10Y2Y", "DXY", "HY", "IG", "WTI", "DTB3", "T10Y", "spread"]
  
  # Training period
  train_start: "2008-01-01"
  train_end: "2025-12-31"
  val_days: 252
  
  # Window configuration
  lookback_window: 63  # 3 months of daily data per sample
  target_horizon: 5    # 5-day prediction
  
model:
  observable_dim: 64        # Koopman observables (K)
  encoder_hidden: [128, 128] # MLP encoder layers
  encoder_activation: "relu"
  linearity_weight: 1.0     # Loss weight for linearity constraint
  prediction_weight: 1.0    # Loss weight for prediction MSE
  spectral_weight: 0.1      # Loss weight for spectral penalty
  
training:
  epochs: 500
  batch_size: 32
  learning_rate: 0.001
  patience: 20              # Early stopping
  dmd_init: true            # Initialize with Dynamic Mode Decomposition
  
signals:
  output_dir: "signals"
  predictability_threshold: 0.6  # Minimum predictability to include
  modes_to_track: 5         # Top K modes to report

github_actions:
  max_runtime_minutes: 300  # 5 hour safety margin
  cache_data: true
